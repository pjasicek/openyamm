screen: SpellInspect

elements:
  - id: SpellInspectRoot
    anchor: top_left
    width: 440
    height: 236
    z_index: 520
    visible: false
    asset:
      default: parchment
    children:
      - id: SpellInspectTitle
        anchor: top_center
        offset_x: 0
        offset_y: 12
        width: 260
        height: 22
        text:
          value: "{title}"
          font: Create
          color: "#ffff9b"
          align_x: center
          align_y: middle

      - id: SpellInspectBody
        anchor: top_left
        offset_x: 20
        offset_y: 42
        width: 400
        height: 72
        text:
          value: "{body}"
          font: SMALLNUM
          color: white
          align_x: left
          align_y: top

      - id: SpellInspectNormal
        anchor: top_left
        offset_x: 20
        offset_y: 122
        width: 400
        height: 16
        text:
          value: "{normal}"
          font: SMALLNUM
          color: white
          align_x: left
          align_y: middle

      - id: SpellInspectExpert
