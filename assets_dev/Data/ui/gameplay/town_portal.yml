      - id: TownPortalBalthazarLairButton
        anchor: top_left
        offset_x: 14
        offset_y: 298
        width: 63
        height: 64
        z_index: 100
        interactive: true
        asset:
          default: ""
          highlighted: TP_BalthazarLair
          pressed: TP_BalthazarLair

      - id: TownPortalCloseButton
