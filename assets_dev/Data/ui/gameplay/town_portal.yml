screen: TownPortal

elements:
  - id: TownPortalRoot
    anchor: center
    width: 640
    height: 480
    z_index: 440
    visible: true
    scale:
      min: 1.0
      max: 3.0
    children:
      - id: TownPortalBackground
        anchor: top_left
        offset_x: 0
        offset_y: 0
        width: 640
        height: 480
        z_index: 0
        asset:
          default: townport

      - id: TownPortalRavenshoreButton
        anchor: top_left
        offset_x: 274
        offset_y: 174
        width: 62
        height: 43
        z_index: 100
        interactive: true
        asset:
          default: ""
          highlighted: TP_Ravenshore
          pressed: TP_Ravenshore

      - id: TownPortalAlvarButton
        anchor: top_left
        offset_x: 269
        offset_y: 36
        width: 55
        height: 50
        z_index: 100
        interactive: true
        asset:
          default: ""
          highlighted: TP_Alvar
          pressed: TP_Alvar

      - id: TownPortalShadowspireButton
        anchor: top_left
        offset_x: 444
        offset_y: 127
        width: 76
        height: 53
        z_index: 100
        interactive: true
        asset:
          default: ""
          highlighted: TP_Shadowspire
          pressed: TP_Shadowspire

      - id: TownPortalDaggerWoundIslandsButton
        anchor: top_left
        offset_x: 460
        offset_y: 303
        width: 61
        height: 49
        z_index: 100
        interactive: true
        asset:
          default: ""
          highlighted: TP_DaggerWoundIslands
          pressed: TP_DaggerWoundIslands

      - id: TownPortalRegnaButton
        anchor: top_left
        offset_x: 204
