screen: Journal

elements:
  - id: JournalRoot
    anchor: center
    width: 640
    height: 480
    z_index: 440
    visible: true
    scale:
      min: 1.0
      max: 3.0
    children:
      - id: JournalBackground
        anchor: top_left
        offset_x: 0
        offset_y: 0
        width: 640
        height: 480
        z_index: 0
        asset:
          default: IRBgrnd

      - id: JournalQuestsTopLeftArt
        anchor: top_left
        offset_x: 0
        offset_y: 0
        width: 114
        height: 78
        z_index: 10
        asset:
          default: IRB-2

      - id: JournalStoryTopLeftArt
        anchor: top_left
        offset_x: 0
        offset_y: 0
        width: 160
        height: 64
        z_index: 10
        asset:
          default: IRB-3

