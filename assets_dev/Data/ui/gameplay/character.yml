screen: Character

elements:
  - id: CharacterRoot
    anchor: center
    width: 640
    height: 480
    scale:
      min: 1.0
      max: 3.0
    notes: Character screen rooted to the classic MM8 composition from the reference screenshot.
    children:
      - id: CharacterTopBar
        anchor: top_center
        width: 640
        height: 29
        z_index: 50
        asset:
          default: topbar
        notes: Duplicated from the gameplay HUD so character pages can layer independently above it.
        children:
          - id: CharacterGoldFoodIcon
            anchor: center_in
            offset_x: -165
            width: 134
            height: 21
            asset:
              default: scoreBG
            notes: Gold and food background art.

          - id: CharacterGoldLabel
            anchor: center_in
            offset_x: -85
            width: 28
            height: 14
            text:
              value: "{gold}"
              font: SMALLNUM
              align_x: center
              align_y: middle
            notes: Gold counter.

          - id: CharacterFoodLabel
            anchor: center_in
            offset_x: -180
            width: 28
            height: 14
            text:
              value: "{food}"
              font: SMALLNUM
              align_x: center
              align_y: middle
            notes: Food counter.

      - id: CharacterDismissButton
        anchor: top_left
        offset_x: 525
        offset_y: 380
        width: 75
        height: 26
        z_index: 300
        interactive: true
        asset:
          default: but26U
          highlighted: but26H
          pressed: but26D

      - id: CharacterStatsButton
        anchor: bottom_Left
        offset_x: 16
        offset_y: -118
        width: 75
        height: 26
        z_index: 300
        interactive: true
        asset:
          default: But20U
          pressed: But20D
          highlighted: But20H
        notes: Button to switch to character stats page

      - id: CharacterSkillsButton
