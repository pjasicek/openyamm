screen: OutdoorHud

elements:
  - id: OutdoorBasebar
    anchor: bottom_center
    width: 640
    height: 114
    z_index: 200
    scale:
      min: 1.0
      max: 3.0
    asset:
      default: Basebar
    notes: Legacy centered base bar kept for stacked overlays above gameplay.
