      - id: OutdoorPartyStrip
        anchor: top_left
        width: 483
        height: 114
        asset:
          default: FACEMASK
          selected: selring
          frame: manaFRM
          health_bar: ManaG
          mana_bar: manaB
        notes: Legacy party strip used by overlay screens.

      - id: OutdoorStatusBar
        anchor: center_in
        offset_x: -78.5
        offset_y: -47
        width: 483
        height: 15
        text:
          font: Lucida
          align_x: center
          align_y: middle
        notes: Legacy one-line status region used by overlay screens.

