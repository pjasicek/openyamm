screen: OutdoorHud

elements:
  - id: OutdoorBasebar
    anchor: bottom_center
    width: 640
    height: 114
    z_index: 200
    scale:
      min: 1.0
      max: 3.0
    asset:
      default: Basebar
    notes: Bottom party HUD base bar.
    children:
      - id: OutdoorPartyStrip
        anchor: top_left
        width: 483
        height: 114
        asset:
          default: FACEMASK
          selected: selring
          frame: manaFRM
          health_bar: ManaG
          mana_bar: manaB
        notes: Dynamic party strip supporting one to five members.

      - id: OutdoorStatusBar
        anchor: center_in
        offset_x: -78.5
        offset_y: -47
        width: 483
        height: 15
        text:
          font: Lucida
          align_x: center
          align_y: middle
        notes: Centered one-line status text region above party strip.

      - id: OutdoorMinimap
        anchor: right
        offset_x: -19
        width: 122
        height: 83
        asset:
          default: MINIMAP
        notes: Moving minimap texture crop.

      - id: OutdoorMinimapFrame
        anchor: right
        width: 159
        height: 113
        asset:
          default: mapframe
        notes: Minimap frame and lower-left corner treatment.
        children:
          - id: OutdoorMinimapZoomIn
            anchor: top_right
            offset_x: -4
            offset_y: 6
            width: 13
            height: 15
            interactive: true
            asset:
              default: map+up
              pressed: map+dn
            notes: Minimap zoom in button.

          - id: OutdoorMinimapZoomOut
            anchor: bottom_right
            offset_x: -4
            offset_y: -5
            width: 13
            height: 15
            interactive: true
            asset:
              default: map-up
              pressed: map-dn
            notes: Minimap zoom out button.

      - id: CharShield_1
        anchor: top_left
        offset_x: 15
        offset_y: 22
        width: 67
        height: 92
        asset:
          default: IBshield01
        notes: Empty party slot shield 1.

      - id: CharShield_2
        anchor: top_left
        offset_x: 113
        offset_y: 22
        width: 67
        height: 92
        asset:
          default: IBshield01
        notes: Empty party slot shield 2.

      - id: CharShield_3
        anchor: top_left
        offset_x: 211
        offset_y: 22
        width: 67
        height: 92
        asset:
          default: IBshield02
        notes: Empty party slot shield 3.

      - id: CharShield_4
        anchor: top_left
        offset_x: 308
        offset_y: 22
        width: 67
        height: 92
        asset:
          default: IBshield03
        notes: Empty party slot shield 4.

      - id: CharShield_5
        anchor: top_left
        offset_x: 405
        offset_y: 22
        width: 67
        height: 92
        asset:
          default: IBshield04
        notes: Empty party slot shield 5.

  - id: OutdoorTopBar
    anchor: top_center
    width: 640
    height: 29
    z_index: 50
    scale:
      min: 1.0
      max: 3.0
    asset:
      default: topbar
    notes: Top gameplay bar.
    children:
      - id: OutdoorButtonOptions
        anchor: center_in
        offset_x: 220
        width: 50
        height: 22
        interactive: true
        asset:
          default: butn4u
          highlighted: butn4d
          pressed: butn4d
        notes: Options button.

      - id: OutdoorButtonQuickRef
        anchor: center_in
        offset_x: 165
        width: 60
        height: 24
        interactive: true
        asset:
          default: butn3u
          highlighted: butn3d
          pressed: butn3d
        notes: Quick reference button.

      - id: OutdoorButtonRest
        anchor: center_in
        offset_x: 115
        width: 40
        height: 24
        interactive: true
        asset:
          default: butn2u
          highlighted: butn2d
          pressed: butn2d
        notes: Rest button.

      - id: OutdoorButtonBooks
        anchor: center_in
        offset_x: 72.5
        width: 40
        height: 24
        interactive: true
        asset:
          default: butn1u
          highlighted: butn1d
          pressed: butn1d
        notes: Books button.

      - id: OutdoorGoldFoodIcon
        anchor: center_in
        offset_x: -165
        width: 134
        height: 21
        asset:
          default: scoreBG
        notes: Gold and food bar background.

      - id: OutdoorFoodLabel
        anchor: center_in
        offset_x: -180
        width: 28
        height: 14
        text:
          value: "{food}"
          font: SMALLNUM
          align_x: center
          align_y: middle
        notes: Food counter text region.

      - id: OutdoorGoldLabel
        anchor: center_in
