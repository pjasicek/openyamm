screen: MainMenu

elements:
  - id: MainMenuRoot
    anchor: center
    width: 640
    height: 480
    children:
      - id: MainMenuBackground
        anchor: top_left
        width: 640
        height: 480
        z_index: 0
        asset:
          default: title

      - id: MainMenuActionColumn
        anchor: inside_top_right
        offset_x: -20
        offset_y: 184
        width: 135
        height: 179
        z_index: 20

      - id: MainMenuNewGameButton
        anchor: top_left
        offset_x: 515
        offset_y: 203
        width: 106
        height: 32
        z_index: 20
        interactive: true
        asset:
          default: T_new_up
          highlighted: T_new_ht
          pressed: T_new_dn

      - id: MainMenuLoadGameButton
        anchor: top_left
        offset_x: 515
        offset_y: 241
        width: 106
        height: 32
        z_index: 20
        interactive: true
        asset:
          default: T_load_up
          highlighted: T_load_ht
          pressed: T_load_dn

      - id: MainMenuCreditsButton
        anchor: top_left
        offset_x: 515
        offset_y: 279
        width: 106
        height: 32
        z_index: 20
        interactive: true
        asset:
          default: T_cred_up
          highlighted: T_cred_ht
          pressed: T_cred_dn

      - id: MainMenuQuitButton
        anchor: top_left
        offset_x: 515
        offset_y: 317
        width: 106
        height: 32
        z_index: 20
        interactive: true
        asset:
          default: T_quit_up
          highlighted: T_quit_ht
          pressed: T_quit_dn
