screen: Rest

elements:
  - id: RestRoot
    anchor: center
    width: 640
    height: 480
    z_index: 430
    visible: true
    scale:
      min: 1.0
      max: 3.0
    children:
      - id: RestBackground
        anchor: top_left
        offset_x: 0
        offset_y: 0
        width: 640
        height: 366
        z_index: 0
        asset:
          default: restmain

      - id: RestSkyAnimation
        anchor: top_left
        offset_x: 96
        offset_y: 26
        width: 444
        height: 108
        z_index: 10
        asset:
          default: terra0000

      - id: RestHourglass
        anchor: top_left
        offset_x: 384
        offset_y: 163
        width: 72
        height: 114
        z_index: 20
        asset:
          default: HGLAS001

      - id: RestButton8Hours
        anchor: top_left
        offset_x: 61
        offset_y: 155
        width: 272
        height: 42
        z_index: 30
        interactive: true
        asset:
          default: R8hU
          highlighted: R8hH
          pressed: R8hD

      - id: RestButtonUntilDawn
        anchor: top_left
        offset_x: 100
        offset_y: 239
        width: 188
        height: 30
        z_index: 30
        interactive: true
        asset:
          default: RdawnU
          highlighted: RdawnH
          pressed: RdawnD

      - id: RestFoodCostText
        anchor: top_left
        offset_x: 287
        offset_y: 167
        width: 30
        height: 20
        z_index: 40
        text:
          value: "{rest_food_cost}"
          font: Create
          align_x: right
          align_y: top

      - id: RestButton1Hour
        anchor: top_left
        offset_x: 100
        offset_y: 271
        width: 188
        height: 30
        z_index: 30
        interactive: true
        asset:
          default: R1hU
          highlighted: R1hH
          pressed: R1hD

      - id: RestButton5Minutes
        anchor: top_left
