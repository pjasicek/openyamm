; OpenYAMM settings
; Volumes use the original-style 0..9 scale.

[audio]
sound_volume=3
music_volume=3
voice_volume=6

[controls]
turn_rate=smooth
walksound=true
show_hits=true
always_run=true
flip_on_exit=false

[gameplay]
keyboard_interaction_depth=512
mouse_interaction_depth=512

[startup]
start_in_main_menu=false

[keyboard]
forward=W
backward=S
left=A
right=D
yell=Y
jump=X
combat=Return
cast_ready=Q
attack=F
trigger=Space
cast=C
pass=B
char_cycle=Tab
quest=I
quick_ref=Z
rest=R
history=H
auto_notes=N
map_book=L
always_run_toggle=U
look_up=Page_Down
look_down=Delete
center_view=End
zoom_in=Add
zoom_out=Subtract
fly_up=J
fly_down=K
land=Home

[video]
blood_splats=true
colored_lights=false
tinting=false
shadows=false
texture_filtering=true
terrain_filtering=anisotropic
terrain_anisotropy=8x
bmodel_filtering=linear
billboard_filtering=linear
ui_filtering=linear
text_filtering=nearest
minimap_filtering=linear
window_mode=windowed
resolution=1920x1080
gameplay_ui_layout=widescreen

[debug]
preseed_party=true
party_seed_roster_id=0
start_map_file=out01.odm
override_start_position=true
start_x=-12824
start_y=18487
start_z=600
start_flying=false
movement_speed_multiplier=1
immortal=true
unlimited_mana=true
